on:
  push:
    branches:
      - main
# For OIDC token exchange with Qlty:
# - Configuring OpenID Connect in cloud providers - GitHub Docs
#   https://docs.github.com/en/actions/how-tos/secure-your-work/security-harden-deployments/oidc-in-cloud-providers#adding-permissions-settings
permissions:
  contents: read
  id-token: write
jobs:
  call-workflow:
    uses: yukihiko-shinoda/reusable-workflow-invoke-lint-qlty/.github/workflows/workflow.yml@d559042ef2b0dc7bb96be1e03a1c4abd1d100a69  # v1.1.0
    with:
      # Install the real CLI tools (skill-validator, markdownlint-cli2) that the bundled suite
      # (csklint/_tests) shells out to, via this project's own installer.
      # sudo: the installer writes /usr/local/bin and runs `npm install -g` (passwordless on hosted runners).
      # env "PATH=$PATH": sudo's secure_path would otherwise hide the per-user uv installed by setup-uv.
      # --no-sync: prevent root from re-syncing .venv and leaving root-owned files behind.
      post-sync-command: sudo env "PATH=$PATH" uv run --no-sync csklint install
    permissions:
      contents: read
      id-token: write
