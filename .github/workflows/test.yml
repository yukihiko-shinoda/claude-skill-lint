name: Test
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  call-workflow-test:
    uses: yukihiko-shinoda/reusable-workflow-invoke-lint-test/.github/workflows/workflow.yml@33e2c7ac8a46f8e37113fb4ccb1be5497e5fd48a  # v1.1.0
    with:
      support-python-versions: "[ '3.14', '3.13', '3.12', '3.11', '3.10', '3.9' ]"
      # Windows is intentionally unsupported for now.
      support-os: "[ 'ubuntu-latest' ]"
      # Install the real CLI tools (skill-validator, markdownlint-cli2) that the bundled suite
      # (csklint/_tests) shells out to, via this project's own installer.
      # sudo: the installer writes /usr/local/bin and runs `npm install -g` (passwordless on hosted runners).
      # env "PATH=$PATH": sudo's secure_path would otherwise hide the per-user uv installed by setup-uv.
      # --no-sync: prevent root from re-syncing .venv and leaving root-owned files behind.
      post-sync-command-linux: sudo env "PATH=$PATH" uv run --no-sync csklint install
  call-workflow-lint:
    uses: yukihiko-shinoda/reusable-workflow-invoke-lint-lint/.github/workflows/workflow.yml@0966c64de69c044585bbdca96980a8393c761829  # v1.0.0
